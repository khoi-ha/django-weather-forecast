{% load static %}

<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <meta name="description" content="A simple weather forecast SPA built on Django. This personal project
        is heavily inspired by WeaWoW, and has nothing to do with the live music marketplace of the same name.">
        
        <title> Wegow Weather - Simple Django weather forecast</title>
        
        <link rel="canonical" href="https://wegow.site/">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100;0,400;0,700;1,900&display=swap" rel="stylesheet">
        <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" 
            integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        <link rel="stylesheet" href="{% static 'css/style.css' %}">
        
        <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
        <script src="https://benalman.com/code/projects/jquery-throttle-debounce/jquery.ba-throttle-debounce.js"></script>
        <script src="https://code.iconify.design/iconify-icon/2.1.0/iconify-icon.min.js"></script>
        <script src="https://code.iconify.design/2/2.1.0/iconify.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" 
                integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    </head>
    <body>
    <h1 id="page-name" class="text-center mt-5 mb-3"> WEATHER FORECAST </h1>

    <nav class="navbar justify-content-center">
        <form id="search-form" class="d-flex" role="search">
            <div class="dropdown w-100 me-2">
                <input id="search-bar" class="form-control" type="search" 
                    placeholder="Select a location. Type to view suggestions." aria-label="Search" 
                    title="Format is [City], [State], [Country]. You can omit the state."
                    data-bs-toggle="dropdown" aria-expanded="false" autocomplete="off">
                <ul id="location-suggestions" class="dropdown-menu w-100">
                </ul>
            </div>
            <button id="search-button" class="btn btn-outline-light" type="submit" aria-label="Search">
                <iconify-icon icon="mdi:map-marker-outline"></iconify-icon>
                <span class="visually-hidden"> Click to search for a location </span>
            </button>
        </form>
    </nav>
    
    <p id="location-line" class="text-center mt-4 mb-4"> <span id="location-prefix"> 3-day weather in </span> <span id="location-name"></span> </p> 

    <div id="weather-display" class="carousel slide mx-auto my-4" data-ride="carousel">
        <div id="weather-container" class="carousel-inner rounded-3">
        </div>
    
        <button class="carousel-control-prev" type="button" data-bs-target="#weather-display" data-bs-slide="prev">
            <span class="carousel-control-prev-icon" aria-hidden="true"></span>
            <span class="visually-hidden">Previous</span>
        </button>
        
        <button class="carousel-control-next" type="button" data-bs-target="#weather-display" data-bs-slide="next">
            <span class="carousel-control-next-icon" aria-hidden="true"></span>
            <span class="visually-hidden">Next</span>
        </button>
    </div>

    <template id="weather-card-template">
        <div class="weather-card carousel-item overflow-hidden">
            <img class="weather-background" 
                    src="[background]" alt="First slide">
            
            <div class="overlay d-flex justify-content-center">
                <div class="main-weather container w-75 mb-lg-3 mb-md-3 mb-5">
                    <div class="date row mx-2 mx-lg-5 mx-md-4 mx-sm-3 px-lg-4 
                                mt-lg-0 mt-md-3 mt-4"> [date] </div>
                    <div class="row mx-lg-5 mx-2 mx-md-4 mx-sm-3 px-lg-4">
                        <iconify-icon icon="wi:day-sunny" class="weather-icon col-auto ps-0 pe-1"></iconify-icon>
                        <div class="col"> 
                            <div class="weather-type row"> [weather-type] </div>
                            <div class="description row"> [description] </div>
                        </div>
                    </div>
                    <div class="temp row mx-2 mx-lg-5 mx-md-4 mx-sm-3 px-lg-4"> [min-temp]°C / [max-temp]°C </div>
                </div>

                <div class="auxillary-info container mx-6 mb-lg-5 mb-md-3 mb-sm-2 mb-2 mt-4">
                    <div class="row">
                        <div class="col-6 d-flex align-items-center justify-content-lg-center 
                            justify-content-md-center justify-content-start">
                            <span><iconify-icon icon="wi:thermometer" class="info-icon"></iconify-icon></span>
                            <div>    
                                <div class="info-type text-start">Feels Like</div>
                                <div class="info text-start">[feels-like]°C</div>
                            </div>
                        </div>
                        <div class="col-6 d-flex align-items-center justify-content-lg-center 
                            justify-content-md-center justify-content-start">
                            <span><iconify-icon icon="wi:snowflake-cold" class="info-icon"></iconify-icon></span>
                            <div>    
                                <div class="info-type text-start">Snowfall</div>
                                <div class="info text-start">[snowfall] mm/d</div>
                            </div>
                        </div>
                        <div class="col-6 d-flex align-items-center justify-content-lg-center 
                            justify-content-md-center justify-content-start">
                            <span><iconify-icon icon="wi:cloud" class="info-icon"></iconify-icon></span>
                            <div>    
                                <div class="info-type text-start">Cloud cover</div>
                                <div class="info text-start"> [cloud-cover]%</div>
                            </div>
                        </div>
                        <div class="col-6 d-flex align-items-center justify-content-lg-center 
                            justify-content-md-center justify-content-start">
                            <span><iconify-icon icon="wi:strong-wind" class="info-icon"></iconify-icon></span>
                            <div>    
                                <div class="info-type text-start"> Wind speed </div>
                                <div class="info text-start">[wind-speed] km/h</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </template>

    <!-- Including Bootstrap JS (with its jQuery dependency) so that dynamic components work -->
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" 
            integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js" 
            integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y" crossorigin="anonymous"></script>
    <script src="{% static 'js/main.js' %}"></script>
</body>
</html>
